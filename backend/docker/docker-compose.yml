services:
  mysql:
    image: mysql:8.0
    container_name: chainvault-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_dev
      MYSQL_DATABASE: chainvault
      MYSQL_USER: chainvault
      MYSQL_PASSWORD: chainvault_dev
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - chainvault_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  chainvault_mysql_data:
