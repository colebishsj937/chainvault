spring:
  application:
    name: chainvault-admin
  datasource:
    url: jdbc:mysql://127.0.0.1:${DB_PORT:3307}/chainvault?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: ${DB_USER:chainvault}
    password: ${DB_PASS:chainvault_dev}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}
      lettuce:
        pool:
          max-active: 8

server:
  port: 8081

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.chainvault: INFO

chainvault:
  docs:
    gateway-base-url: ${GATEWAY_BASE_URL:http://localhost:8082}
  admin:
    auth-enabled: true
    jwt:
      secret: ${ADMIN_JWT_SECRET:chainvault-dev-jwt-secret-change-in-production-min-32}
      expiration-hours: 24
    public-paths:
      - /admin/api/v1/auth/login
  keyvault:
    master-key-source: env
    encrypt-key: ${MASTER_ENCRYPT_KEY:dev-only-32bytes-encrypt-key!!}
